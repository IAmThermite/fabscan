name: Scrape prices

# Daily price refresh. Publishes prices.json + a regenerated manifest.json to the
# gh-pages branch (served by GitHub Pages); leaves the existing cards.db in place.
on:
  schedule:
    - cron: "0 0 * * *" # 00:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-data # serialise with build-card-db.yml to avoid push races
  cancel-in-progress: false

env:
  CARD_JSON: https://raw.githubusercontent.com/IAmThermite/flesh-and-blood-cards/feature/card-art-hashes/json/english/card.json
  PAGES_BASE_URL: https://iamthermite.github.io/fabscan

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull the currently-published files so the manifest keeps the card_db
      # section (and we replace prices.json + manifest.json).
      - name: Fetch published data
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: public

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Scrape prices
        run: |
          mkdir -p public
          python tool/scrape_prices.py --from "$CARD_JSON" --out public

      - name: Regenerate manifest
        run: python tool/build_manifest.py --dir public --base-url "$PAGES_BASE_URL"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
