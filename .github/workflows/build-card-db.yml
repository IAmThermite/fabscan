name: Build card DB

# Rebuilds cards.db from the flesh-and-blood-cards fork and publishes it (+ a
# regenerated manifest.json) to gh-pages so the app can hot-pull a newer DB
# without an app release. Card data changes infrequently, so this runs weekly
# and on demand; leaves the existing prices.json in place.
on:
  schedule:
    - cron: "0 0 * * 1" # 00:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-data # serialise with scrape-prices.yml to avoid push races
  cancel-in-progress: false

env:
  CARD_JSON: https://raw.githubusercontent.com/IAmThermite/flesh-and-blood-cards/feature/card-art-hashes/json/english/card.json
  PAGES_BASE_URL: https://iamthermite.github.io/fabscan

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pull the currently-published files so the manifest keeps the prices
      # section (and we replace cards.db + manifest.json).
      - name: Fetch published data
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: public

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build cards.db
        run: |
          mkdir -p public
          python tool/build_card_db.py --from "$CARD_JSON" --out public/cards.db

      - name: Regenerate manifest
        run: python tool/build_manifest.py --dir public --base-url "$PAGES_BASE_URL"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
